name: CI

on:
  push:
    branches: [main, v2-http-support]
  pull_request:
    branches: [main, v2-http-support]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check prettier
        run: npm run format:check
      
      - name: Check eslint
        run: npm run lint
      
      - name: Run tests
        run: npm test
      
      - name: Build package
        run: npm run build
